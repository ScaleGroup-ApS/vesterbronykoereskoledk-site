name: Scaleweb.dk Deployment

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.scaleweb.dk
  IMAGE_NAME: ${{ github.event.repository.name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    if: ${{ vars.REGISTRY_USER != '' }}
    outputs:
      short-sha: ${{ steps.meta.outputs.short-sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Building image with tag: ${SHORT_SHA}"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --file ./Dockerfile \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short-sha }} \
            --push \
            --label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.created=${{ github.event.head_commit.timestamp }} \
            .

  notify-crm:
    name: Notify CRM Deployment Service
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.result == 'success'
    steps:
      - name: Derive namespace
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          NAMESPACE=$(echo "$REPO_NAME" | sed 's/-site$//')
          echo "NAMESPACE=$NAMESPACE" >> "$GITHUB_ENV"

      - name: Trigger image rollout
        run: |
          curl -sf -X POST "${{ secrets.CRM_INTERNAL_URL }}/internal/deploy/standard" \
            -H "Authorization: Bearer ${{ secrets.CRM_INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"imageTag\":\"${{ needs.build-and-push.outputs.short-sha }}\",\"slug\":\"$NAMESPACE\"}"
